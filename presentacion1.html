<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Inter',sans-serif;
color:white;
text-align:center;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
overflow:hidden;
padding:40px;
}

/* glow fondo */

.bg-glow{
position:absolute;
width:520px;
height:520px;
background:radial-gradient(circle,#3b82f6,transparent 70%);
filter:blur(120px);
opacity:0.35;
animation:float 8s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-35px)}
100%{transform:translateY(0)}
}

/* tarjeta principal */

.card{

z-index:2;

background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);

backdrop-filter:blur(16px);

padding:50px 40px;
border-radius:18px;

max-width:520px;

box-shadow:
0 25px 70px rgba(0,0,0,0.6);

animation:fadeUp 1s ease;

}

/* animación */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

h1{
font-size:44px;
margin-bottom:14px;
font-weight:800;
letter-spacing:-0.5px;
}

p{
font-size:20px;
opacity:0.75;
line-height:1.6;
}

/* linea */

.line{
width:90px;
height:4px;
margin:18px auto;
background:linear-gradient(90deg,#3b82f6,#22d3ee);
border-radius:20px;
}

/* footer */

.footer{
position:absolute;
bottom:50px;
font-size:12px;
opacity:0.35;
letter-spacing:3px;
}

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="card">

<h1>Bienvenidos</h1>

<div class="line"></div>

<p>
Esta es la primera diapositiva de la presentación.<br>
Aquí comienza el recorrido del tema que exploraremos hoy.
</p>

</div>

<div class="footer">
PRESENTACIÓN
</div>

</body>
</html>
