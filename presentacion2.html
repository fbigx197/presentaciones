<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:'Inter',sans-serif;
background:linear-gradient(160deg,#020617,#0f172a,#1e293b);
color:white;
padding:30px;
}

/* fondo glow */

.glow{
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle,#3b82f6,transparent 70%);
filter:blur(120px);
opacity:0.25;
z-index:0;
}

/* contenedor */

.container{
z-index:1;
width:100%;
max-width:500px;
}

/* titulo */

h1{
font-size:40px;
margin-bottom:8px;
font-weight:800;
}

.subtitle{
opacity:0.65;
font-size:18px;
margin-bottom:30px;
}

/* lista */

.list{
display:flex;
flex-direction:column;
gap:18px;
}

/* tarjetas */

.card{

display:flex;
align-items:center;
gap:16px;

background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);

border-radius:14px;

padding:20px;

backdrop-filter:blur(10px);

animation:fadeUp 0.6s ease;

}

/* numero */

.number{

font-size:28px;
font-weight:800;
color:#3b82f6;
min-width:40px;

}

/* texto */

.text h2{
margin:0;
font-size:20px;
font-weight:600;
}

.text p{
margin:3px 0 0;
font-size:15px;
opacity:0.6;
}

/* animacion */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.footer{
margin-top:40px;
font-size:12px;
letter-spacing:3px;
opacity:0.35;
text-align:center;
}

</style>

</head>

<body>

<div class="glow"></div>

<div class="container">

<h1>Contenido</h1>
<div class="subtitle">Temas de la presentación</div>

<div class="list">

<div class="card">
<div class="number">01</div>
<div class="text">
<h2>Introducción</h2>
<p>Contexto general del tema.</p>
</div>
</div>

<div class="card">
<div class="number">02</div>
<div class="text">
<h2>Problema</h2>
<p>Situación actual y desafíos.</p>
</div>
</div>

<div class="card">
<div class="number">03</div>
<div class="text">
<h2>Desarrollo</h2>
<p>Análisis de las ideas principales.</p>
</div>
</div>

<div class="card">
<div class="number">04</div>
<div class="text">
<h2>Conclusión</h2>
<p>Resultados y reflexiones finales.</p>
</div>
</div>

</div>

<div class="footer">AGENDA</div>

</div>

</body>
</html>
