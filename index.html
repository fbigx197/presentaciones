<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Presentación</title>

<style>

body{
margin:0;
background:#020617;
overflow:hidden;
}

/* visor */

iframe{
width:100vw;
height:100vh;
border:none;
}

/* barra progreso */

.progress{
position:fixed;
top:0;
left:0;
width:100%;
height:3px;
background:rgba(255,255,255,0.1);
z-index:5;
}

.bar{
height:100%;
width:50%;
background:linear-gradient(90deg,#3b82f6,#22d3ee);
transition:width .4s ease;
}

/* botones mini */

.controls{
position:fixed;
bottom:8px;
right:8px;
display:flex;
gap:4px;
z-index:30;
}

button{
width:22px;
height:22px;
font-size:10px;
border:none;
border-radius:5px;
background:rgba(255,255,255,0.15);
color:white;
backdrop-filter:blur(6px);
}

/* video transición */

#transition{

position:fixed;
top:0;
left:0;

width:100vw;
height:100vh;

object-fit:cover;

opacity:0;

z-index:20;

pointer-events:none;

}

</style>
</head>

<body>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<!-- visor de slides -->
<iframe id="slideFrame"></iframe>

<!-- video transición -->
<video id="transition" src="transicion.mp4"></video>

<div class="controls">
<button onclick="prev()">◀</button>
<button onclick="next()">▶</button>
<button onclick="toggleFull()">□</button>
</div>

<script>

/* ============================= */
/*        CARGA MÁS ACÁ          */
/* añade tus slides aquí abajo   */
/* ============================= */

const slides = [

"presentacion1.html",
"presentacion2.html",

// "presentacion3.html",
// "presentacion4.html",
// "presentacion5.html"

];

/* ============================= */

let current = 0;

const frame = document.getElementById("slideFrame");
const video = document.getElementById("transition");

/* cargar primer slide */

frame.src = slides[0];

/* transición */

function changeSlide(newIndex){

current = newIndex;

/* cargar nuevo slide primero */

frame.src = slides[current];

updateProgress();

/* reproducir transición encima */

video.style.opacity = 1;

video.currentTime = 0;

video.play();

video.onended = () => {

video.style.opacity = 0;

}

}

function next(){

if(current < slides.length - 1){
changeSlide(current + 1);
}

}

function prev(){

if(current > 0){
changeSlide(current - 1);
}

}

/* barra progreso */

function updateProgress(){

let percent = ((current + 1) / slides.length) * 100;

document.getElementById("progressBar").style.width = percent + "%";

}

/* pantalla completa */

function toggleFull(){

if(!document.fullscreenElement){
document.documentElement.requestFullscreen();
}else{
document.exitFullscreen();
}

}

/* swipe móvil */

let startX = 0;

document.addEventListener("touchstart", e => {
startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {

let endX = e.changedTouches[0].clientX;

let diff = startX - endX;

if(diff > 40) next();
if(diff < -40) prev();

});

updateProgress();

</script>

</body>
</html>
