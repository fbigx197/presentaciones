<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Presentación</title>

<style>

body{
margin:0;
background:#0f172a;
font-family:sans-serif;
overflow:hidden;
}

iframe{
width:100vw;
height:100vh;
border:none;
}

.controls{
position:fixed;
bottom:15px;
right:15px;
display:flex;
gap:6px;
}

button{
width:38px;
height:38px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
background:rgba(255,255,255,0.15);
color:white;
backdrop-filter:blur(6px);
}

button:hover{
background:rgba(255,255,255,0.25);
}

</style>
</head>

<body>

<iframe id="slideFrame" src="presentacion1.html"></iframe>

<div class="controls">

<button onclick="slide1()">◀</button>
<button onclick="slide2()">▶</button>
<button onclick="toggleFull()">[ ]</button>

</div>

<script>

function toggleFull(){

if(!document.fullscreenElement){
document.documentElement.requestFullscreen();
}else{
document.exitFullscreen();
}

}

function slide1(){
document.getElementById("slideFrame").src="presentacion1.html";
}

function slide2(){
document.getElementById("slideFrame").src="presentacion2.html";
}

</script>

</body>
</html>
