<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Presentación</title>

<style>

body{
margin:0;
background:#0f172a;
font-family:sans-serif;
overflow:hidden;
}

iframe{
width:100vw;
height:100vh;
border:none;
}

.controls{
position:fixed;
bottom:20px;
right:20px;
display:flex;
gap:10px;
}

button{
padding:12px 18px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
}

.full{background:#22c55e;color:white;}
.exit{background:#ef4444;color:white;}
.nav{background:#38bdf8;color:white;}

</style>
</head>

<body>

<iframe id="slideFrame" src="presentacion1.html"></iframe>

<div class="controls">

<button class="nav" onclick="slide1()">1</button>
<button class="nav" onclick="slide2()">2</button>

<button class="full" onclick="entrarFull()">Pantalla completa</button>
<button class="exit" onclick="salirFull()">Salir</button>

</div>

<script>

function entrarFull(){
document.documentElement.requestFullscreen();
}

function salirFull(){
document.exitFullscreen();
}

function slide1(){
document.getElementById("slideFrame").src="presentacion1.html";
}

function slide2(){
document.getElementById("slideFrame").src="presentacion2.html";
}

</script>

</body>
</html>
